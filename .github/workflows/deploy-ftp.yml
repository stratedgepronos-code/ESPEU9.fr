# Déploiement automatique vers Hostinger via SSH (rsync, port 65002)
name: Deploy to FTP (Hostinger)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy via rsync (SSH)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_PORT: ${{ secrets.SSH_PORT || '65002' }}
          REMOTE_PATH: /home/u527192911/domains/espeu9.fr/public_html
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -p ${SSH_PORT} -o StrictHostKeyChecking=no" \
            --exclude='.git' --exclude='.cursorrules' --exclude='config.php' \
            ./public_html/ \
            ${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}/
