# Déploiement automatique vers Hostinger via SFTP (SSH port 65002)
name: Deploy to FTP (Hostinger)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REMOTE_PATH: /home/u527192911/domains/espeu9.fr/public_html
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SFTP (SSH)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '65002' }}
          local_path: ./public_html/*
          remote_path: ${{ env.REMOTE_PATH }}
          sftp_only: true
