<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — ESPE Basket U9</title>
  <meta name="theme-color" content="#0f1628">
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f1628;
      --bg-surface: #161d35;
      --green-900: #0a2e14; --green-800: #147a32; --green-700: #1a9b3e; --green-600: #1eb845;
      --green-500: #2dd955; --green-400: #4ae474; --green-glow: rgba(45,217,85,0.25);
      --gold: #e8b930; --gold-light: #f5d45a; --gold-glow: rgba(232,185,48,0.2);
      --text: #e8ecf4; --text-dim: #8694b2; --text-muted: #4d5b78;
      --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.12);
      --card-bg: rgba(22,29,53,0.7);
      --input-bg: rgba(15,22,40,0.6);
      --surface: rgba(255,255,255,0.03);
      --surface2: rgba(255,255,255,0.05);
      --red: #f87171; --blue: #60a5fa;
    }
    html { height: 100%; scroll-behavior: smooth; }
    body {
      min-height: 100vh; font-family: 'Outfit', sans-serif;
      background: var(--bg); color: var(--text); overflow-x: hidden;
    }

    /* ── ANIMATED AURORA BACKGROUND ── */
    .bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-base {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #0f1628 0%, #131b33 30%, #0d1a24 60%, #111827 100%);
    }
    .aurora-orb {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.4;
      will-change: transform;
    }
    .aurora-orb-1 {
      width: 55vw; height: 55vw; max-width: 700px; max-height: 700px;
      background: radial-gradient(circle, rgba(26,155,62,0.35) 0%, transparent 70%);
      top: -15%; left: -10%;
      animation: aurora1 18s ease-in-out infinite alternate;
    }
    .aurora-orb-2 {
      width: 45vw; height: 45vw; max-width: 600px; max-height: 600px;
      background: radial-gradient(circle, rgba(232,185,48,0.2) 0%, transparent 70%);
      bottom: -20%; right: -8%;
      animation: aurora2 22s ease-in-out infinite alternate;
    }
    .aurora-orb-3 {
      width: 35vw; height: 35vw; max-width: 500px; max-height: 500px;
      background: radial-gradient(circle, rgba(45,217,85,0.15) 0%, transparent 70%);
      top: 40%; right: 20%;
      animation: aurora3 15s ease-in-out infinite alternate;
    }
    .aurora-orb-4 {
      width: 30vw; height: 30vw; max-width: 400px; max-height: 400px;
      background: radial-gradient(circle, rgba(96,165,250,0.12) 0%, transparent 70%);
      bottom: 10%; left: 25%;
      animation: aurora4 20s ease-in-out infinite alternate;
    }
    @keyframes aurora1 {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(8vw, 6vh) scale(1.15); }
      66%  { transform: translate(-4vw, 10vh) scale(0.9); }
      100% { transform: translate(5vw, -3vh) scale(1.05); }
    }
    @keyframes aurora2 {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(-6vw, -8vh) scale(1.2); }
      66%  { transform: translate(5vw, -4vh) scale(0.85); }
      100% { transform: translate(-3vw, 5vh) scale(1.1); }
    }
    @keyframes aurora3 {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(-10vw, 6vh) scale(1.25); }
      100% { transform: translate(5vw, -8vh) scale(0.9); }
    }
    @keyframes aurora4 {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(8vw, -5vh) scale(1.15); }
      100% { transform: translate(-6vw, 3vh) scale(0.95); }
    }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(45,217,85,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45,217,85,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 20%, transparent 70%);
    }
    .bg-noise {
      position: absolute; inset: 0; opacity: 0.015;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 256px 256px;
    }
    .bg-logo {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: min(60vw, 450px); height: min(60vw, 450px);
      background: url('/images/logo-espe.png') center/contain no-repeat;
      opacity: 0.03; pointer-events: none;
    }

    /* ── LAYOUT ── */
    .admin-wrap { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .admin-header {
      display: flex; align-items: center; justify-content: space-between; padding: 16px 24px;
      background: rgba(15,22,40,0.7); backdrop-filter: blur(24px) saturate(1.3);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .admin-header-left { display: flex; align-items: center; gap: 14px; }
    .admin-header img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(45,217,85,0.3); }
    .admin-header h1 {
      font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .admin-header-right { display: flex; gap: 10px; align-items: center; }

    /* ── BUTTONS ── */
    .btn {
      padding: 8px 16px; border: none; border-radius: 10px; font-family: 'Outfit';
      font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.25s ease;
      display: inline-flex; align-items: center; gap: 6px; position: relative; overflow: hidden;
    }
    .btn::after {
      content: ''; position: absolute; inset: 0; opacity: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      transition: opacity 0.25s;
    }
    .btn:hover::after { opacity: 1; }
    .btn-primary {
      background: linear-gradient(135deg, #147a32, #2dd955); color: white;
      box-shadow: 0 4px 15px rgba(45,217,85,0.2);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(45,217,85,0.35); }
    .btn-ghost {
      background: rgba(255,255,255,0.05); color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); border-color: var(--border-hover); }
    .btn-danger { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
    .btn-danger:hover { background: rgba(248,113,113,0.2); }
    .btn-blue { background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: white; box-shadow: 0 4px 15px rgba(59,130,246,0.2); }
    .btn-blue:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(59,130,246,0.35); }
    .btn-gold { background: linear-gradient(135deg, #b8940e, var(--gold)); color: #1a1400; box-shadow: 0 4px 15px var(--gold-glow); }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(232,185,48,0.35); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 2px; padding: 12px 24px;
      background: rgba(15,22,40,0.5); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); overflow-x: auto;
    }
    .tab {
      padding: 10px 20px; border-radius: 10px 10px 0 0; border: none;
      background: transparent; color: var(--text-muted); font-family: 'Outfit';
      font-weight: 600; font-size: 14px; cursor: pointer;
      transition: all 0.25s; white-space: nowrap; position: relative;
    }
    .tab:hover { color: var(--text-dim); background: rgba(255,255,255,0.03); }
    .tab.active {
      color: var(--gold); background: rgba(232,185,48,0.06);
      border-bottom: 2px solid var(--gold);
    }

    /* ── CONTENT ── */
    .admin-content { flex: 1; padding: 24px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .section-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px;
      background: linear-gradient(135deg, var(--text), var(--text-dim));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--card-bg); backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid var(--border); border-radius: 18px;
      padding: 22px; margin-bottom: 16px;
      transition: all 0.3s ease; position: relative;
    }
    .card::before {
      content: ''; position: absolute; inset: 0; border-radius: 18px;
      background: linear-gradient(135deg, rgba(45,217,85,0.04) 0%, transparent 50%, rgba(232,185,48,0.03) 100%);
      pointer-events: none;
    }
    .card:hover { border-color: var(--border-hover); transform: translateY(-1px); box-shadow: 0 8px 32px rgba(0,0,0,0.2); }

    /* ── STAT CARDS ── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-card {
      background: linear-gradient(145deg, rgba(22,29,53,0.8), rgba(15,22,40,0.6));
      border: 1px solid var(--border); border-radius: 16px; padding: 20px;
      text-align: center; position: relative; overflow: hidden;
      transition: all 0.3s ease;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--green-700), var(--green-400), var(--gold));
      opacity: 0.6;
    }
    .stat-card:hover { border-color: rgba(45,217,85,0.15); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
    .stat-card .stat-value {
      font-family: 'Bebas Neue'; font-size: 38px; line-height: 1;
      background: linear-gradient(135deg, var(--green-400), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-card .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; }

    /* ── TABLE ── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th {
      text-align: left; padding: 12px 12px; font-size: 11px; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 700;
    }
    .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .data-table tr { transition: background 0.2s; }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }
    .data-table .badge { display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
    .badge-win { background: rgba(45,217,85,0.12); color: var(--green-400); }
    .badge-loss { background: rgba(248,113,113,0.12); color: var(--red); }
    .badge-dom { background: rgba(96,165,250,0.12); color: var(--blue); }
    .badge-ext { background: rgba(168,85,247,0.12); color: #c084fc; }

    /* ── FORMS ── */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: 11px; font-weight: 700; color: var(--text-muted);
      margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;
    }
    .form-input {
      width: 100%; padding: 10px 14px;
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'Outfit'; font-size: 14px;
      transition: all 0.25s;
    }
    .form-input:focus {
      outline: none; border-color: var(--green-500);
      box-shadow: 0 0 0 3px rgba(45,217,85,0.1), 0 0 20px rgba(45,217,85,0.05);
    }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(10,14,26,0.7);
      backdrop-filter: blur(12px); z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .modal {
      background: linear-gradient(145deg, rgba(22,29,53,0.95), rgba(15,22,40,0.98));
      border: 1px solid var(--border-hover); border-radius: 22px; padding: 28px;
      max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 80px rgba(45,217,85,0.04);
    }
    .modal h2 {
      font-family: 'Bebas Neue'; font-size: 24px; margin-bottom: 18px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* ── STANDINGS ── */
    .standings-row {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      border-radius: 12px; margin-bottom: 4px; transition: background 0.2s;
    }
    .standings-row:hover { background: rgba(255,255,255,0.03); }
    .standings-row:nth-child(1) { background: linear-gradient(90deg, rgba(232,185,48,0.08), transparent); }
    .standings-row:nth-child(2) { background: linear-gradient(90deg, rgba(45,217,85,0.06), transparent); }
    .standings-rank {
      font-family: 'Bebas Neue'; font-size: 24px; width: 32px; text-align: center;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .standings-team { flex: 1; font-weight: 600; font-size: 14px; }
    .standings-pts { font-family: 'Bebas Neue'; font-size: 20px; color: var(--text-dim); }
    .espe-highlight { color: var(--green-400); font-weight: 700; text-shadow: 0 0 20px rgba(45,217,85,0.3); }

    /* ── SYNC STATUS ── */
    .sync-bar {
      display: flex; align-items: center; gap: 12px; padding: 14px 18px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .sync-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green-400); box-shadow: 0 0 10px var(--green-glow);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--green-glow); } 50% { opacity: 0.4; box-shadow: 0 0 4px var(--green-glow); } }
    .sync-text { font-size: 13px; color: var(--text-dim); flex: 1; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; padding: 14px 22px;
      border-radius: 14px; font-weight: 600; font-size: 14px; z-index: 2000;
      animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
      backdrop-filter: blur(20px);
    }
    .toast-success { background: rgba(5,95,70,0.9); color: #4ae474; border: 1px solid rgba(45,217,85,0.3); box-shadow: 0 8px 30px rgba(45,217,85,0.15); }
    .toast-error { background: rgba(127,29,29,0.9); color: #fca5a5; border: 1px solid rgba(248,113,113,0.3); box-shadow: 0 8px 30px rgba(248,113,113,0.15); }
    @keyframes slideUp { from { transform: translateY(30px) scale(0.95); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .admin-header { padding: 12px 16px; }
      .admin-header h1 { font-size: 20px; }
      .admin-content { padding: 16px; }
      .tabs { padding: 8px 16px; }
      .tab { padding: 8px 14px; font-size: 13px; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }
      .modal { padding: 20px; border-radius: 16px; }
      .data-table { font-size: 12px; }
      .data-table th, .data-table td { padding: 8px 6px; }
      .stat-card .stat-value { font-size: 28px; }
      .aurora-orb { filter: blur(80px); opacity: 0.3; }
    }
    @media (max-width: 480px) {
      .stat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .stat-card { padding: 14px; }
      .admin-header h1 { font-size: 17px; letter-spacing: 1.5px; }
      .btn { padding: 7px 12px; font-size: 12px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .aurora-orb { animation: none; }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(45,217,85,0.25); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(45,217,85,0.4); }

    /* ── LOADING ── */
    .loader {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid var(--border); border-top-color: var(--green-400);
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* ── EDIT INLINE ── */
    .inline-input {
      background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'Outfit'; font-size: 13px;
      padding: 5px 8px; width: 60px; text-align: center; transition: all 0.2s;
    }
    .inline-input:focus { outline: none; border-color: var(--green-500); box-shadow: 0 0 0 2px rgba(45,217,85,0.1); }
    .inline-input-wide { width: 120px; }

    .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .tag-synced { background: rgba(45,217,85,0.1); color: var(--green-400); }
    .tag-manual { background: rgba(232,185,48,0.1); color: var(--gold); }
  </style>
</head>
<body>
<div class="bg-layer">
  <div class="bg-base"></div>
  <div class="aurora-orb aurora-orb-1"></div>
  <div class="aurora-orb aurora-orb-2"></div>
  <div class="aurora-orb aurora-orb-3"></div>
  <div class="aurora-orb aurora-orb-4"></div>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
</div>
<div class="bg-logo"></div>

<div class="admin-wrap" id="app"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef, useCallback } = React;
const h = React.createElement;
const API = "api.php";

const PLAYERS = [
  { id: 1, num: 6, firstName: "Malone", lastName: "HAUTION" },
  { id: 2, num: 8, firstName: "Tristan", lastName: "COLLARD" },
  { id: 3, num: 9, firstName: "Gaspard", lastName: "HAMM" },
  { id: 4, num: 10, firstName: "Amine", lastName: "SLAH" },
  { id: 5, num: 11, firstName: "Diego", lastName: "FRANCART" },
  { id: 6, num: 12, firstName: "Jonas", lastName: "DELE" },
  { id: 7, num: 13, firstName: "Marceau", lastName: "FALZON" },
  { id: 8, num: 14, firstName: "Robin", lastName: "FISCHESSER" },
];

function Toast({ message, type, onClose }) {
  useEffect(function() { var t = setTimeout(onClose, 3500); return function() { clearTimeout(t); }; }, []);
  return h("div", { className: "toast toast-" + type }, message);
}

function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("dashboard");
  const [toast, setToast] = useState(null);

  const showToast = function(msg, type) { setToast({ message: msg, type: type || "success" }); };

  useEffect(function() {
    fetch(API + "?action=check_session", { credentials: "same-origin" })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.logged_in && d.user && d.user.role === "coach") setUser(d.user);
        else window.location.href = "gate.html";
        setLoading(false);
      }).catch(function() { window.location.href = "gate.html"; });
  }, []);

  if (loading) return h("div", { style: { display: "flex", justifyContent: "center", alignItems: "center", minHeight: "100vh" } }, h("div", { className: "loader", style: { width: 40, height: 40 } }));

  var getStats = function(pNum) {
    var totalPts = 0, totalTirs = 0, totalFautes = 0, totalLf = 0, totalT2i = 0, totalT2e = 0, totalT3 = 0, games = 0;
    matches.forEach(function(m) {
      var s = (m.espeStats || []).find(function(x) { return x.num === pNum; });
      if (s) { games++; totalPts += s.pts||0; totalTirs += s.tirs||0; totalFautes += s.fautes||0; totalLf += s.lf||0; totalT2i += s.t2i||0; totalT2e += s.t2e||0; totalT3 += s.t3||0; }
    });
    return { games: games, totalPts: totalPts, totalTirs: totalTirs, totalFautes: totalFautes, totalLf: totalLf, totalT2i: totalT2i, totalT2e: totalT2e, totalT3: totalT3, avgPts: games > 0 ? (totalPts/games).toFixed(1) : "0" };
  };

  if (loading) return h("div", { style: { textAlign: "center", padding: 40 } }, h("div", { className: "loader" }));

  return h("div", null,
    h("div", { className: "section-title" }, "\uD83D\uDC65 STATISTIQUES JOUEURS"),
    h("div", { className: "card", style: { overflowX: "auto" } },
      h("table", { className: "data-table" },
        h("thead", null, h("tr", null,
          h("th", null, "#"), h("th", null, "Joueur"), h("th", null, "Matchs"), h("th", null, "Pts"), h("th", null, "Moy/match"), h("th", null, "Tirs"), h("th", null, "3pts"), h("th", null, "2pI"), h("th", null, "2pE"), h("th", null, "LF"), h("th", null, "Fautes"))),
        h("tbody", null, PLAYERS.map(function(p) {
          var s = getStats(p.num);
          return h("tr", { key: p.id },
            h("td", { style: { fontWeight: 700, color: "var(--gold)" } }, p.num),
            h("td", { style: { fontWeight: 600 } }, p.firstName, " ", p.lastName),
            h("td", null, s.games),
            h("td", { style: { fontWeight: 700, color: "var(--green-400)" } }, s.totalPts),
            h("td", null, s.avgPts),
            h("td", null, s.totalTirs),
            h("td", null, s.totalT3),
            h("td", null, s.totalT2i),
            h("td", null, s.totalT2e),
            h("td", null, s.totalLf),
            h("td", null, s.totalFautes));
        })))));
}

// ═══════════════════════════════════════════
// FFBB TAB
// ═══════════════════════════════════════════
function FFBBTab({ showToast }) {
  const [url, setUrl] = useState("");
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [syncResult, setSyncResult] = useState(null);
  const [lastSync, setLastSync] = useState("");

  useEffect(function() {
    fetch(API + "?action=ffbb_get_url", { credentials: "same-origin" })
      .then(function(r) { return r.json(); })
      .then(function(d) { if (d.success && d.ffbb_url) setUrl(d.ffbb_url); setLoading(false); })
      .catch(function() { setLoading(false); });
    fetch(API + "?action=ffbb_standings", { credentials: "same-origin" })
      .then(function(r) { return r.json(); })
      .then(function(d) { if (d.success && d.last_sync) setLastSync(d.last_sync); })
      .catch(function() {});
  }, []);

  var handleSaveUrl = function() {
    setSaving(true);
    fetch(API + "?action=ffbb_set_url", { method: "POST", credentials: "same-origin", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "ffbb_set_url", ffbb_url: url }) })
      .then(function(r) { return r.json(); })
      .then(function(d) { setSaving(false); if (d.success) showToast("URL FFBB enregistr\u00E9e"); else showToast(d.error, "error"); })
      .catch(function() { setSaving(false); showToast("Erreur r\u00E9seau", "error"); });
  };

  var handleSync = function() {
    setSyncing(true); setSyncResult(null);
    fetch(API + "?action=ffbb_sync", { credentials: "same-origin" })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        setSyncing(false);
        if (d.success) {
          setSyncResult(d);
          setLastSync(new Date().toLocaleString("fr-FR"));
          showToast(d.matches_synced + " match(s) synchronis\u00E9(s)");
        } else { showToast(d.error || "Erreur", "error"); }
      }).catch(function() { setSyncing(false); showToast("Erreur r\u00E9seau", "error"); });
  };

  if (loading) return h("div", { style: { textAlign: "center", padding: 40 } }, h("div", { className: "loader" }));

  return h("div", null,
    h("div", { className: "section-title" }, "\uD83D\uDD04 SYNCHRONISATION FFBB"),
    h("div", { className: "card" },
      h("h3", { style: { fontSize: 16, fontWeight: 700, marginBottom: 12 } }, "\uD83C\uDF10 URL du championnat FFBB"),
      h("p", { style: { fontSize: 13, color: "var(--text-dim)", marginBottom: 12 } }, "Collez ici le lien de votre \u00E9quipe sur competitions.ffbb.com. Les matchs, scores et classement seront import\u00E9s automatiquement."),
      h("div", { style: { display: "flex", gap: 10, flexWrap: "wrap" } },
        h("input", { className: "form-input", style: { flex: 1, minWidth: 250 }, value: url, onChange: function(e) { setUrl(e.target.value); }, placeholder: "https://competitions.ffbb.com/ligues/..." }),
        h("button", { className: "btn btn-primary", onClick: handleSaveUrl, disabled: saving }, saving ? "..." : "\uD83D\uDCBE Enregistrer")),
      lastSync && h("div", { style: { marginTop: 10, fontSize: 12, color: "var(--text-dim)" } }, "\u23F0 Derni\u00E8re synchronisation : ", lastSync)),
    h("div", { className: "card", style: { marginTop: 16 } },
      h("h3", { style: { fontSize: 16, fontWeight: 700, marginBottom: 12 } }, "\u26A1 Synchroniser maintenant"),
      h("p", { style: { fontSize: 13, color: "var(--text-dim)", marginBottom: 16 } }, "R\u00E9cup\u00E8re les derniers r\u00E9sultats, scores et classement depuis la FFBB. Les stats joueurs (import feuille de match) ne sont pas touch\u00E9es."),
      h("button", { className: "btn btn-blue", style: { padding: "12px 24px", fontSize: 15 }, onClick: handleSync, disabled: syncing },
        syncing ? h("span", null, h("span", { className: "loader", style: { width: 16, height: 16, marginRight: 8 } }), "Synchronisation en cours...") : "\uD83D\uDD04 Lancer la synchronisation"),
      syncResult && h("div", { style: { marginTop: 16, padding: 16, background: "rgba(22,163,74,0.1)", border: "1px solid rgba(22,163,74,0.2)", borderRadius: 12 } },
        h("div", { style: { fontWeight: 700, marginBottom: 8, color: "var(--green-400)" } }, "\u2705 Synchronisation r\u00E9ussie"),
        h("div", { style: { fontSize: 13, color: "var(--text-dim)" } }, syncResult.matches_total, " matchs trouv\u00E9s, ", syncResult.matches_synced, " synchronis\u00E9(s)"),
        syncResult.standings && syncResult.standings.length > 0 && h("div", { style: { marginTop: 12 } },
          h("div", { style: { fontWeight: 600, fontSize: 13, marginBottom: 6 } }, "\uD83C\uDFC6 Classement import\u00E9 :"),
          syncResult.standings.map(function(s, i) {
            return h("div", { key: i, style: { fontSize: 13, padding: "2px 0" } }, s.rank, ". ", s.team, " \u2014 ", s.points, " pts");
          })))));
}

ReactDOM.createRoot(document.getElementById("app")).render(h(App));
</script>
</body>
