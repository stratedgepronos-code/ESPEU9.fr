<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accès membres — ESPE Basket U9</title>
  <meta name="theme-color" content="#0a1f0d">
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green-900: #0a1f0d; --green-800: #0f3d1a; --green-700: #1a6b2e; --green-500: #228b38;
      --gold: #c8a832; --gold-light: #e8cc5a; --text: #e8f0ea; --text-dim: #9cb5a4; --border: rgba(255,255,255,0.08);
    }
    html { height: 100%; }
    body {
      min-height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--green-900);
      color: var(--text);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(26,107,46,0.25) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(200,168,50,0.08) 0%, transparent 45%),
        linear-gradient(180deg, #0a1f0d 0%, #0d2b14 50%, #0a1f0d 100%);
      pointer-events: none;
      z-index: 0;
    }
    .gate-wrap { position: relative; z-index: 1; width: 100%; max-width: 440px; }
    .logo-block {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-block img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 4px 20px rgba(26,107,46,0.4));
    }
    .logo-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 2.75rem);
      letter-spacing: 0.2em;
      color: #fff;
      margin-top: 12px;
      text-shadow: 0 0 40px rgba(26,107,46,0.3);
    }
    .logo-sub {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: var(--gold-light);
      margin-top: 4px;
      opacity: 0.9;
    }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--gold);
      background: rgba(200,168,50,0.12);
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 28px;
      margin-left: 6px;
      margin-right: 6px;
      border: 1px solid rgba(200,168,50,0.25);
    }
    .badge-season {
      background: rgba(26,107,46,0.35);
      color: var(--text);
      border-color: rgba(255,255,255,0.12);
      font-weight: 600;
    }
    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      line-height: 1.15;
      text-align: center;
      margin-bottom: 8px;
      color: #fff;
      letter-spacing: 0.02em;
    }
    .headline-sub {
      font-size: 14px;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .card {
      background: rgba(15,61,26,0.6);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: rgba(0,0,0,0.2);
      padding: 4px;
      border-radius: 14px;
    }
    .tab {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text-dim);
      transition: all 0.25s ease;
    }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--green-700); color: #fff; }
    .panel { display: none; }
    .panel.active { display: block; }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(0,0,0,0.25);
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: rgba(255,255,255,0.35); }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: var(--green-500);
      box-shadow: 0 0 0 3px rgba(26,107,46,0.2);
    }
    .field select option { background: #0f3d1a; color: #fff; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }
    .remember {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--text-dim);
    }
    .remember input { width: 18px; height: 18px; accent-color: var(--green-700); }
    .btn-primary {
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--green-700) 0%, #165a28 100%);
      color: #fff;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(26,107,46,0.35);
      letter-spacing: 0.03em;
    }
    .btn-primary:hover {
      box-shadow: 0 6px 28px rgba(26,107,46,0.45);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg {
      background: rgba(220,38,38,0.15);
      border: 1px solid rgba(220,38,38,0.4);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.show { display: block; }
    .success-msg {
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.4);
      color: #86efac;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .success-msg.show { display: block; }
    .footer-text {
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 24px;
      line-height: 1.6;
    }
    .footer-text a { color: var(--gold-light); text-decoration: none; font-weight: 600; }
    .footer-text a:hover { text-decoration: underline; }
    .copyright {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 32px;
      letter-spacing: 0.05em;
    }
    @media (max-width: 480px) {
      .card { padding: 22px 18px; }
      .logo-block img { width: 56px; height: 56px; }
      .tabs { flex-direction: row; }
    }
  </style>
</head>
<body>
  <div class="gate-wrap">
    <div class="logo-block">
      <img src="/images/logo-espe.png" alt="ESPE" onerror="this.style.display='none'">
      <div class="logo-title">ESPE BASKET</div>
      <div class="logo-sub">U9 · Châlons</div>
    </div>
    <div style="text-align: center;">
      <span class="badge">Espace membres</span>
      <span class="badge badge-season">Saison 2025-2026</span>
    </div>
    <h1 class="headline">L'espace des familles</h1>
    <p class="headline-sub">Convocations, messagerie et actualités de l'équipe.<br>Connecte-toi ou crée ton compte.</p>

    <div class="card">
      <div class="tabs">
        <button type="button" class="tab active" data-tab="login">Connexion</button>
        <button type="button" class="tab" data-tab="register">Créer un compte</button>
      </div>

      <div id="errBox" class="error-msg"></div>
      <div id="okBox" class="success-msg"></div>

      <div id="panel-login" class="panel active">
        <form id="formLogin">
          <div class="field">
            <label for="loginUser">Identifiant</label>
            <input type="text" id="loginUser" name="username" placeholder="Identifiant" required autocomplete="username">
          </div>
          <div class="field">
            <label for="loginPass">Mot de passe</label>
            <input type="password" id="loginPass" name="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <label class="remember">
            <input type="checkbox" id="loginRemember" name="remember">
            <span>Se souvenir de moi</span>
          </label>
          <button type="submit" class="btn-primary" id="btnLogin">Accéder à l'espace</button>
        </form>
      </div>

      <div id="panel-register" class="panel">
        <form id="formRegister">
          <div class="field">
            <label for="regUser">Identifiant</label>
            <input type="text" id="regUser" name="username" placeholder="ex: papa.malone" required minlength="3" maxlength="50" autocomplete="username">
          </div>
          <div class="field">
            <label for="regPass">Mot de passe</label>
            <input type="password" id="regPass" name="password" placeholder="6 caractères minimum" required minlength="6" autocomplete="new-password">
          </div>
          <div class="field">
            <label for="regEmail">Email (optionnel)</label>
            <input type="email" id="regEmail" name="email" placeholder="email@exemple.fr" autocomplete="email">
          </div>
          <div class="field">
            <label for="regPlayer">Mon enfant (joueur)</label>
            <select id="regPlayer" name="player_id" required>
              <option value="">— Choisir un joueur —</option>
              <option value="1" data-name="Malone HAUTION">#6 Malone HAUTION</option>
              <option value="2" data-name="Tristan COLLARD">#8 Tristan COLLARD</option>
              <option value="3" data-name="Gaspard HAMM">#9 Gaspard HAMM</option>
              <option value="4" data-name="Amine SLAH">#10 Amine SLAH</option>
              <option value="5" data-name="Diego FRANCART">#11 Diego FRANCART</option>
              <option value="6" data-name="Jonas DELE">#12 Jonas DELE</option>
              <option value="7" data-name="Marceau FALZON">#13 Marceau FALZON</option>
              <option value="8" data-name="Robin FISCHESSER">#14 Robin FISCHESSER</option>
            </select>
          </div>
          <div class="row">
            <div class="field">
              <label>Je suis</label>
              <select id="regParentType" name="parent_type">
                <option value="papa">Papa</option>
                <option value="maman">Maman</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn-primary" id="btnRegister" style="margin-top: 8px;">Créer mon compte</button>
        </form>
      </div>
    </div>

    <p class="footer-text">Mot de passe oublié ? <a href="index.html#connexion">Demander un lien</a> (depuis l’app).</p>
    <p class="copyright">© 2026 ESPE Basket Châlons · U9</p>
  </div>

  <script>
    (function() {
      var API = 'api.php';
      // Si déjà connecté, rediriger vers l'accueil
      fetch(API + '?action=check_session', { credentials: 'same-origin' })
        .then(function(r) { return r.json(); })
        .then(function(d) { if (d.logged_in) { window.location.href = 'index.html'; return; } initForms(); })
        .catch(function() { initForms(); });

      function initForms() {
      var errBox = document.getElementById('errBox');
      var okBox = document.getElementById('okBox');
      function showErr(m) { errBox.textContent = m || ''; errBox.classList.toggle('show', !!m); okBox.classList.remove('show'); }
      function showOk(m) { okBox.textContent = m || ''; okBox.classList.toggle('show', !!m); errBox.classList.remove('show'); }

        document.querySelectorAll('.tab').forEach(function(t) {
          t.addEventListener('click', function() {
            var tab = t.dataset.tab;
            document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
            document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
            t.classList.add('active');
            document.getElementById('panel-' + tab).classList.add('active');
            showErr('');
            showOk('');
          });
        });

        document.getElementById('formLogin').addEventListener('submit', function(e) {
        e.preventDefault();
        var user = document.getElementById('loginUser').value.trim();
        var pass = document.getElementById('loginPass').value;
        if (!user || !pass) { showErr('Remplis tous les champs.'); return; }
        var btn = document.getElementById('btnLogin');
        btn.disabled = true;
        showErr('');
        fetch(API + '?action=login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        })
          .then(function(r) { return r.json(); })
          .then(function(d) {
            btn.disabled = false;
            if (d.success) {
              showOk('Connexion réussie. Redirection…');
              setTimeout(function() { window.location.href = 'index.html'; }, 600);
            } else { showErr(d.error || 'Identifiant ou mot de passe incorrect'); }
          })
          .catch(function() { btn.disabled = false; showErr('Erreur réseau.'); });
        });

        document.getElementById('formRegister').addEventListener('submit', function(e) {
        e.preventDefault();
        var user = document.getElementById('regUser').value.trim();
        var pass = document.getElementById('regPass').value;
        var email = document.getElementById('regEmail').value.trim();
        var playerId = document.getElementById('regPlayer').value;
        var playerOpt = document.getElementById('regPlayer').selectedOptions[0];
        var playerName = playerOpt && playerOpt.dataset.name ? playerOpt.dataset.name : '';
        var parentType = document.getElementById('regParentType').value;
        if (!user || !pass) { showErr('Identifiant et mot de passe requis.'); return; }
        if (!playerId) { showErr('Choisis un joueur (ton enfant).'); return; }
        var btn = document.getElementById('btnRegister');
        btn.disabled = true;
        showErr('');
        fetch(API + '?action=register', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: user,
            password: pass,
            email: email || undefined,
            player_id: parseInt(playerId, 10),
            parent_type: parentType,
            player_name: playerName
          })
        })
          .then(function(r) { return r.json(); })
          .then(function(d) {
            btn.disabled = false;
            if (d.success) {
              showOk('Compte créé ! Redirection…');
              setTimeout(function() { window.location.href = 'index.html'; }, 600);
            } else { showErr(d.error || 'Erreur création compte'); }
          })
          .catch(function() { btn.disabled = false; showErr('Erreur réseau.'); });
        });
      }
    })();
  </script>
</body>
</html>
