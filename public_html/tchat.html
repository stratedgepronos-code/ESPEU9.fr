<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tchat — ESPE Basket U9</title>
  <meta name="theme-color" content="#1a6b2e">
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-900: #0f3d1a;
      --green-700: #1a6b2e;
      --green-500: #228b38;
      --green-400: #2da847;
      --gold: #c8a832;
      --gold-light: #e8cc5a;
      --bg: #f5f6f8;
      --surface: #ffffff;
      --surface2: #f0f1f4;
      --border: #e0e2e8;
      --text: #1a1d25;
      --text-dim: #6b7280;
      --red: #dc2626;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 20px rgba(0,0,0,0.08);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── NAV PRINCIPALE (identique au site) ── */
    .nav {
      flex-shrink: 0;
      position: relative;
      z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      box-shadow: var(--shadow);
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 4px;
      height: 64px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-right: auto;
      text-decoration: none;
    }
    .nav-logo img { width: 40px; height: 40px; object-fit: contain; }
    .nav-logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      color: var(--green-900);
    }
    .nav-btn {
      padding: 8px 14px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      white-space: nowrap;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .nav-btn:hover { color: var(--text); background: var(--surface2); }
    .nav-btn.active { color: var(--green-700); background: #e8f5e9; }
    @media (max-width: 640px) {
      .nav { padding: 0 12px; }
      .nav-inner { height: 52px; gap: 2px; }
      .nav-logo-text { font-size: 16px; }
      .nav-logo img { width: 32px; height: 32px; }
      .nav-btn { padding: 6px 8px; font-size: 11px; letter-spacing: 0.5px; }
    }

    /* ── BARRE TCHAT ── */
    .tchat-bar {
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--green-900) 0%, #1a5c2c 60%, var(--green-700) 100%);
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .tchat-bar-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 2px;
    }
    .tchat-bar-meta {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
    }
    .tchat-user-badge {
      font-size: 12px;
      background: rgba(255,255,255,0.18);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .tchat-user-badge.coach { background: rgba(245,158,11,0.45); }

    /* ── CONTENEUR PRINCIPAL ── */
    .tchat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .tchat-inner {
      flex: 1;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      padding: 0 16px;
    }

    /* ── MESSAGES ── */
    .tchat-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px 0 8px;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    .tchat-messages::-webkit-scrollbar { width: 4px; }
    .tchat-messages::-webkit-scrollbar-track { background: transparent; }
    .tchat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .tchat-msg {
      background: var(--surface);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--green-700);
      animation: msgIn 0.22s ease;
      word-break: break-word;
      overflow: hidden;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tchat-msg.coach { border-left-color: #f59e0b; }

    .tchat-msg-header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }
    .tchat-msg-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--green-700);
    }
    .tchat-msg.coach .tchat-msg-name { color: #b45309; }
    .tchat-msg-role {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .tchat-msg-time {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
    }
    .tchat-msg-body {
      font-size: 15px;
      line-height: 1.55;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .tchat-msg-body a {
      color: var(--green-700);
      text-decoration: none;
      font-weight: 600;
      word-break: break-all;
    }
    .tchat-msg-body a:hover { text-decoration: underline; }
    .tchat-msg-body .msg-image {
      max-width: 100%;
      max-height: 320px;
      border-radius: 10px;
      margin-top: 8px;
      display: block;
      object-fit: contain;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .tchat-msg-body .msg-embed {
      margin-top: 10px;
      border-radius: 10px;
      overflow: hidden;
      max-width: 100%;
      background: #000;
    }
    .tchat-msg-body .msg-embed iframe {
      width: 100%;
      height: 200px;
      border: none;
      display: block;
    }
    .tchat-msg-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
    }
    .tchat-msg-actions button {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.15s;
    }
    .tchat-msg-actions button:hover { background: rgba(220,38,38,0.1); color: var(--red); }

    .tchat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 15px;
      padding: 40px 20px;
      text-align: center;
    }
    .tchat-empty-icon { font-size: 44px; margin-bottom: 12px; opacity: 0.45; }

    /* ── ZONE DE SAISIE ── */
    .tchat-form-wrap {
      flex-shrink: 0;
      background: var(--bg);
      padding: 10px 0 14px;
      border-top: 1px solid var(--border);
    }
    .tchat-error {
      background: rgba(220,38,38,0.09);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .tchat-form {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .tchat-input-wrap { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .tchat-input {
      width: 100%;
      min-height: 46px;
      max-height: 110px;
      padding: 11px 16px;
      border: 2px solid var(--border);
      border-radius: 22px;
      font-family: inherit;
      font-size: 15px;
      resize: none;
      line-height: 1.4;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow-y: auto;
    }
    .tchat-input:focus {
      outline: none;
      border-color: var(--green-700);
      box-shadow: 0 0 0 4px rgba(26,107,46,0.1);
    }
    .tchat-input::placeholder { color: var(--text-dim); }
    .tchat-hint { font-size: 11px; color: var(--text-dim); padding-left: 4px; }
    .tchat-send {
      flex-shrink: 0;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      background: var(--green-700);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(26,107,46,0.3);
    }
    .tchat-send:hover { background: var(--green-500); }
    .tchat-send:active { transform: scale(0.93); }
    .tchat-send:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── INVITE DE CONNEXION ── */
    .tchat-login-prompt {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .tchat-login-card {
      max-width: 380px;
      width: 100%;
      padding: 28px 24px;
      background: var(--surface);
      border-radius: 18px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      border: 2px solid var(--green-700);
    }
    .tchat-login-card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--green-700);
      margin-bottom: 10px;
    }
    .tchat-login-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
    .tchat-login-card a {
      display: inline-block;
      padding: 12px 28px;
      background: var(--green-700);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      border-radius: 12px;
      font-size: 15px;
      transition: background 0.2s;
    }
    .tchat-login-card a:hover { background: var(--green-500); }

    .tchat-loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 15px;
    }
  </style>
</head>
<body>

  <!-- NAV PRINCIPALE (identique au site) -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="/images/logo-espe.png" alt="ESPE" onerror="this.src='/logo.png'">
        <span class="nav-logo-text">ESPE BASKET · U9</span>
      </a>
      <a href="index.html#accueil" class="nav-btn">Accueil</a>
      <a href="index.html#joueurs" class="nav-btn">Joueurs</a>
      <a href="index.html#matchs" class="nav-btn">Matchs</a>
      <a href="tchat.html" class="nav-btn active">💬 Tchat</a>
    </div>
  </nav>

  <!-- BARRE TCHAT -->
  <div class="tchat-bar">
    <div>
      <div class="tchat-bar-title">💬 Tchat U9</div>
      <div class="tchat-bar-meta">Messages conservés 2 mois</div>
    </div>
    <span class="tchat-user-badge" id="userBadge">—</span>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="tchat-wrap">
    <div class="tchat-inner">

      <!-- Loading -->
      <div class="tchat-loading" id="loading">Chargement…</div>

      <!-- Non connecté -->
      <div class="tchat-login-prompt" id="loginPrompt" style="display:none">
        <div class="tchat-login-card">
          <h2>Connecte-toi</h2>
          <p>Le tchat est réservé aux membres (parents &amp; coach). Connecte-toi pour envoyer des messages.</p>
          <a href="index.html#connexion">Se connecter</a>
        </div>
      </div>

      <!-- Messages -->
      <div class="tchat-messages" id="messages" style="display:none"></div>

      <!-- Formulaire -->
      <div class="tchat-form-wrap" id="formWrap" style="display:none">
        <div id="errorBox"></div>
        <form class="tchat-form" id="chatForm">
          <div class="tchat-input-wrap">
            <textarea class="tchat-input" id="chatInput"
              placeholder="Écris un message… image, lien YouTube/Spotify ou lien web." rows="1"></textarea>
            <span class="tchat-hint">Images, liens et musiques (YouTube, Spotify) s'affichent automatiquement.</span>
          </div>
          <button type="submit" class="tchat-send" id="sendBtn" title="Envoyer" aria-label="Envoyer">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </form>
      </div>

    </div>
  </div>

  <script>
(function () {
  'use strict';
  const API = 'api.php';
  const messagesEl = document.getElementById('messages');
  const formWrap   = document.getElementById('formWrap');
  const loginPrompt= document.getElementById('loginPrompt');
  const loadingEl  = document.getElementById('loading');
  const errorBox   = document.getElementById('errorBox');
  const chatForm   = document.getElementById('chatForm');
  const chatInput  = document.getElementById('chatInput');
  const sendBtn    = document.getElementById('sendBtn');
  const userBadge  = document.getElementById('userBadge');

  let currentUserId = 0;
  let isAdmin = false;

  /* ── Utilitaires ── */
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }
  function showError(msg) {
    errorBox.innerHTML = msg ? '<div class="tchat-error">' + esc(msg) + '</div>' : '';
  }
  function isAtBottom() {
    return messagesEl.scrollHeight - messagesEl.scrollTop <= messagesEl.clientHeight + 60;
  }
  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  /* ── Rendu du contenu (médias) ── */
  const isImg = u => /\.(jpe?g|png|gif|webp|avif|svg)(\?.*)?$/i.test(u);
  const isYT  = u => /youtube\.com\/watch|youtu\.be\//i.test(u);
  const isSP  = u => /open\.spotify\.com\/(track|album|playlist)\//i.test(u);

  function ytEmbed(u) {
    const m = u.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    return m ? 'https://www.youtube.com/embed/' + m[1] : '';
  }
  function spEmbed(u) {
    const m = u.match(/open\.spotify\.com\/(track|album|playlist)\/([A-Za-z0-9]+)/i);
    return m ? 'https://open.spotify.com/embed/' + m[1] + '/' + m[2] : '';
  }

  function renderContent(content) {
    if (!content) return '';
    const urlRe = /(https?:\/\/[^\s<>"]+)/gi;
    const parts = [];
    let last = 0, m;
    while ((m = urlRe.exec(content)) !== null) {
      const before = content.slice(last, m.index);
      if (before) parts.push({ t: 'text', v: before });
      const url = m[0].replace(/[.,;:!?)>]+$/, '');
      if (isImg(url))     parts.push({ t: 'img',  v: url });
      else if (isYT(url)) parts.push({ t: 'yt',   v: url });
      else if (isSP(url)) parts.push({ t: 'sp',   v: url });
      else                parts.push({ t: 'link', v: url });
      last = m.index + url.length;
    }
    if (last < content.length) parts.push({ t: 'text', v: content.slice(last) });

    return parts.map(function(p) {
      if (p.t === 'text') return esc(p.v).replace(/\n/g, '<br>');
      if (p.t === 'link') return '<a href="' + esc(p.v) + '" target="_blank" rel="noopener noreferrer">' + esc(p.v) + '</a>';
      if (p.t === 'img')  return '<img src="' + esc(p.v) + '" class="msg-image" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
      if (p.t === 'yt') {
        const e = ytEmbed(p.v);
        return e ? '<div class="msg-embed"><iframe src="' + esc(e) + '" allowfullscreen allow="autoplay;encrypted-media;picture-in-picture"></iframe></div>'
                 : '<a href="' + esc(p.v) + '" target="_blank" rel="noopener noreferrer">' + esc(p.v) + '</a>';
      }
      if (p.t === 'sp') {
        const e = spEmbed(p.v);
        return e ? '<div class="msg-embed"><iframe src="' + esc(e) + '" allowfullscreen allow="autoplay;encrypted-media"></iframe></div>'
                 : '<a href="' + esc(p.v) + '" target="_blank" rel="noopener noreferrer">' + esc(p.v) + '</a>';
      }
      return '';
    }).join('');
  }

  /* ── Rendu d'un message ── */
  function renderMsg(m, uid, admin) {
    const own   = m.user_id == uid;
    const del   = own || admin;
    const coach = m.role === 'coach';
    const dt    = m.created_at ? new Date(m.created_at) : null;
    const time  = dt ? dt.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit' }) + ' ' +
                       dt.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }) : '';
    const roleLabel = coach ? '👑 Coach' : 'Parent';
    return (
      '<div class="tchat-msg' + (coach ? ' coach' : '') + '" data-id="' + m.id + '">' +
        '<div class="tchat-msg-header">' +
          '<span class="tchat-msg-name">' + esc(m.display_name) + '</span>' +
          '<span class="tchat-msg-role">' + roleLabel + '</span>' +
          '<span class="tchat-msg-time">' + time + '</span>' +
        '</div>' +
        '<div class="tchat-msg-body">' + renderContent(m.content) + '</div>' +
        (del ? '<div class="tchat-msg-actions"><button class="btn-delete" data-id="' + m.id + '" type="button">🗑 Supprimer</button></div>' : '') +
      '</div>'
    );
  }

  /* ── Supprimer un message ── */
  function bindDelete() {
    messagesEl.querySelectorAll('.btn-delete').forEach(function(btn) {
      btn.onclick = function() {
        var id = parseInt(btn.dataset.id, 10);
        if (!id || !confirm('Supprimer ce message ?')) return;
        fetch(API + '?action=chat_delete', {
          method: 'POST', credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: id })
        }).then(function(r){ return r.json(); }).then(function(data) {
          if (data.success) {
            var el = messagesEl.querySelector('[data-id="' + id + '"]');
            if (el) el.remove();
            if (!messagesEl.querySelector('.tchat-msg')) messagesEl.innerHTML = emptyHtml();
          } else showError(data.error || 'Erreur');
        });
      };
    });
  }

  function emptyHtml() {
    return '<div class="tchat-empty"><div class="tchat-empty-icon">💬</div>Aucun message. Sois le premier à écrire&nbsp;!</div>';
  }

  /* ── Charger les messages ── */
  function applyData(data, firstLoad) {
    currentUserId = data.user_id || 0;
    isAdmin = !!data.is_admin;

    loadingEl.style.display = 'none';

    if (currentUserId) {
      messagesEl.style.display = 'flex';
      formWrap.style.display = 'block';
      loginPrompt.style.display = 'none';
    } else {
      messagesEl.style.display = 'none';
      formWrap.style.display = 'none';
      loginPrompt.style.display = 'flex';
    }

    const wasBottom = isAtBottom();
    messagesEl.innerHTML = data.messages && data.messages.length
      ? data.messages.map(function(msg){ return renderMsg(msg, currentUserId, isAdmin); }).join('')
      : emptyHtml();
    bindDelete();

    if (firstLoad || wasBottom) scrollToBottom();
  }

  function loadMessages(firstLoad) {
    fetch(API + '?action=chat_list&limit=150', { credentials: 'same-origin' })
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data.success) applyData(data, firstLoad);
        else { loadingEl.style.display = 'none'; showError(data.error || 'Erreur'); }
      })
      .catch(function(){ loadingEl.style.display = 'none'; showError('Connexion impossible.'); });
  }

  /* ── Session ── */
  function checkSession() {
    fetch(API + '?action=check_session', { credentials: 'same-origin' })
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data.logged_in && data.user) {
          userBadge.textContent = data.user.display_name || data.user.username;
          if (data.user.role === 'coach') userBadge.classList.add('coach');
        } else {
          userBadge.textContent = 'Non connecté';
        }
      });
  }

  /* ── Envoi ── */
  chatForm.addEventListener('submit', function(e) {
    e.preventDefault();
    var text = chatInput.value.trim();
    if (!text) return;
    if (!currentUserId) { showError('Connecte-toi pour envoyer un message.'); return; }
    sendBtn.disabled = true;
    showError('');
    fetch(API + '?action=chat_post', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: text })
    }).then(function(r){ return r.json(); }).then(function(data){
      sendBtn.disabled = false;
      if (data.success && data.message) {
        chatInput.value = '';
        chatInput.style.height = 'auto';
        var empty = messagesEl.querySelector('.tchat-empty');
        if (empty) empty.remove();
        var div = document.createElement('div');
        div.innerHTML = renderMsg(data.message, currentUserId, isAdmin);
        messagesEl.appendChild(div.firstElementChild);
        bindDelete();
        scrollToBottom();
      } else showError(data.error || 'Erreur envoi');
    }).catch(function(){ sendBtn.disabled = false; showError('Erreur réseau.'); });
  });

  /* ── Auto-resize textarea ── */
  chatInput.addEventListener('input', function() {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 110) + 'px';
  });
  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chatForm.requestSubmit(); }
  });

  /* ── Init + polling ── */
  loadMessages(true);
  checkSession();
  setInterval(function(){ loadMessages(false); }, 5000);
})();
  </script>
</body>
</html>
