/* ───── RESET + VARS (identiques à index.html) ───── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap');
:root {
  --green-900: #0f3d1a; --green-700: #1a6b2e; --green-500: #228b38; --green-400: #2da847;
  --gold: #c8a832; --gold-light: #e8cc5a;
  --bg: #f5f6f8; --surface: #ffffff; --surface2: #f0f1f4; --border: #e0e2e8;
  --text: #1a1d25; --text-dim: #6b7280; --text-light: #9ca3af;
  --red: #dc2626; --accent: var(--green-700);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.08);
}
html { height: 100%; }
body {
  font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text);
  height: 100%; display: flex; flex-direction: column; overflow: hidden;
}

/* ───── NAV (copie exacte index.html) ───── */
.nav { flex-shrink:0; z-index:100; background:rgba(255,255,255,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 24px; }
.nav-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; gap:4px; height:68px; }
.nav-logo { display:flex; align-items:center; gap:12px; margin-right:auto; cursor:pointer; text-decoration:none; }
.nav-logo img { width:44px; height:44px; object-fit:contain; }
.nav-logo-text { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--green-900); }
.nav-btn { padding:8px 16px; border:none; background:transparent; color:var(--text-dim); font-family:'Outfit',sans-serif; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px; cursor:pointer; border-radius:8px; transition:all 0.2s; white-space:nowrap; text-decoration:none; display:inline-block; }
.nav-btn:hover { color:var(--text); background:var(--surface2); }
.nav-btn.active { color:var(--green-700); background:#e8f5e9; }
.nav-desktop-items { display:contents; }
.nav-btn-wrap { position:relative; }
.nav-dropdown-arrow { font-size:10px; margin-left:3px; opacity:0.5; }
.nav-dropdown { display:none; position:absolute; top:100%; left:0; min-width:260px; background:white; border:1px solid var(--border); border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.12); padding:8px 0; z-index:200; max-height:400px; overflow-y:auto; }
.nav-btn-wrap:hover .nav-dropdown { display:block; }
.nav-dropdown-item { display:flex; align-items:center; gap:10px; padding:10px 18px; font-size:14px; font-weight:500; color:var(--text); cursor:pointer; transition:background 0.15s; text-decoration:none; }
.nav-dropdown-item:hover { background:#e8f5e9; color:var(--green-700); }
.nav-dropdown-num { font-family:'Bebas Neue',sans-serif; font-size:16px; color:var(--green-700); width:28px; text-align:center; }
.nav-dropdown-cap { color:var(--gold); font-size:14px; margin-left:auto; }
.nav-social { display:flex; align-items:center; gap:8px; margin-left:12px; }
.nav-social-link { display:flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:50%; background:var(--surface2); color:var(--green-700); transition:all 0.2s; text-decoration:none; }
.nav-social-link:hover { background:var(--green-700); color:white; }
.nav-auth { display:flex; align-items:center; gap:10px; margin-left:12px; background:#f0f0f0; padding:4px 10px 4px 8px; border-radius:10px; }
.nav-auth-name { font-size:13px; color:var(--text); white-space:nowrap; font-weight:600; }
.nav-auth-btn { padding:6px 14px; border-radius:8px; border:none; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all 0.2s; text-decoration:none; display:inline-block; font-family:'Outfit',sans-serif; }
.nav-auth-btn.login { background:var(--gold-light); color:var(--green-900); }
.nav-auth-btn.login:hover { background:#f0d96a; }
.nav-auth-btn.logout { background:#e8e8e8; color:#555; }
.nav-auth-btn.logout:hover { background:#d4d4d4; color:#333; }

/* HAMBURGER */
.nav-hamburger { display:none; background:none; border:none; cursor:pointer; padding:8px; flex-direction:column; gap:5px; z-index:200; }
.nav-hamburger span { display:block; width:22px; height:2px; background:var(--green-900); border-radius:2px; transition:all 0.3s; }
.nav-hamburger.open span:nth-child(1) { transform:rotate(45deg) translate(5px,5px); }
.nav-hamburger.open span:nth-child(2) { opacity:0; }
.nav-hamburger.open span:nth-child(3) { transform:rotate(-45deg) translate(5px,-5px); }
.nav-mobile-menu { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); z-index:150; opacity:0; transition:opacity 0.3s; pointer-events:none; }
.nav-mobile-menu.open { opacity:1; pointer-events:auto; }
.nav-mobile-panel { position:absolute; top:0; right:0; width:280px; height:100%; background:white; box-shadow:-4px 0 24px rgba(0,0,0,0.15); padding:80px 20px 20px; overflow-y:auto; transform:translateX(100%); transition:transform 0.3s ease; }
.nav-mobile-menu.open .nav-mobile-panel { transform:translateX(0); }
.mob-section { margin-bottom:24px; }
.mob-label { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); font-weight:700; margin-bottom:10px; padding-left:4px; }
.mob-btn { display:flex; align-items:center; gap:12px; width:100%; padding:14px 16px; border:none; background:transparent; font-family:'Outfit',sans-serif; font-size:15px; font-weight:600; color:var(--text); cursor:pointer; border-radius:10px; text-decoration:none; transition:background 0.15s; }
.mob-btn:hover { background:var(--surface2); }
.mob-btn.active { background:#e8f5e9; color:var(--green-700); }
.mob-icon { font-size:20px; width:28px; text-align:center; }

  .nav-logo img { width:36px; height:36px; } .nav-logo-text { font-size:16px; letter-spacing:1px; }
  .nav-logo { gap:8px; }
  .nav-desktop-items { display:none !important; }
  .nav-hamburger { display:flex; }
  .nav-mobile-menu { display:block; }
  .nav-social { display:none; }

/* ───── BARRE TCHAT ───── */
.tchat-bar { flex-shrink:0; background:linear-gradient(135deg,var(--green-900) 0%,#1a5c2c 60%,var(--green-700) 100%); color:#fff; padding:10px 24px; display:flex; align-items:center; justify-content:space-between; }
.tchat-bar-title { font-family:'Bebas Neue',sans-serif; font-size:1.25rem; letter-spacing:2px; }
.tchat-bar-sub { font-size:11px; color:rgba(255,255,255,0.65); margin-top:1px; }
.user-badge { font-size:12px; font-weight:600; background:rgba(255,255,255,0.18); padding:4px 12px; border-radius:20px; }
.user-badge.coach { background:rgba(245,158,11,0.4); }

/* ───── ZONE CHAT ───── */
.chat-page { flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; }
.chat-center { flex:1; min-height:0; display:flex; flex-direction:column; width:100%; max-width:800px; margin:0 auto; padding:0 16px; }

/* MESSAGES (récent en haut, ancien en bas → flex-direction: column, no reverse) */
.messages-list { flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:14px 0 8px; }
.messages-list::-webkit-scrollbar { width:4px; }
.messages-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.msg-card { background:var(--surface); border-radius:14px; padding:12px 16px; box-shadow:var(--shadow); border-left:4px solid var(--green-700); word-break:break-word; }
.msg-card.is-coach { border-left-color:#f59e0b; }
@keyframes msgIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
.msg-card.new { animation:msgIn 0.22s ease; }
.msg-head { display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
.msg-name { font-weight:700; font-size:14px; color:var(--green-700); }
.msg-card.is-coach .msg-name { color:#b45309; }
.msg-role { font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-dim); background:var(--surface2); padding:2px 6px; border-radius:4px; }
.msg-time { font-size:11px; color:var(--text-dim); margin-left:auto; }
.msg-body { font-size:15px; line-height:1.55; overflow-wrap:anywhere; }
.msg-body a { color:var(--green-700); font-weight:600; word-break:break-all; }
.msg-body a:hover { text-decoration:underline; }
.msg-body .m-img { display:block; max-width:100%; max-height:300px; border-radius:10px; margin-top:8px; object-fit:contain; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.msg-body .m-embed { margin-top:10px; border-radius:10px; overflow:hidden; max-width:100%; background:#000; line-height:0; }
.msg-body .m-embed iframe { width:100%; height:200px; border:none; display:block; }
.msg-actions { display:flex; justify-content:flex-end; margin-top:7px; }
.msg-del { background:none; border:none; color:var(--text-dim); font-size:11px; font-family:inherit; font-weight:600; cursor:pointer; padding:3px 8px; border-radius:6px; transition:all 0.15s; }
.msg-del:hover { background:rgba(220,38,38,0.1); color:var(--red); }
.chat-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-dim); text-align:center; padding:32px; }
.chat-empty-icon { font-size:44px; opacity:0.4; margin-bottom:10px; }

.chat-error { background:rgba(220,38,38,0.09); border:1px solid var(--red); color:var(--red); padding:8px 14px; border-radius:10px; font-size:13px; margin-bottom:8px; }
.chat-form { display:flex; gap:10px; align-items:flex-end; }
.chat-input-col { flex:1; display:flex; flex-direction:column; gap:3px; }
.chat-textarea { width:100%; min-height:46px; max-height:110px; padding:11px 16px; border:2px solid var(--border); border-radius:22px; font-family:inherit; font-size:15px; resize:none; line-height:1.4; background:var(--surface); color:var(--text); transition:border-color 0.2s,box-shadow 0.2s; overflow-y:hidden; }
.chat-textarea:focus { outline:none; border-color:var(--green-700); box-shadow:0 0 0 3px rgba(26,107,46,0.12); }
.chat-textarea::placeholder { color:var(--text-dim); }
.chat-hint { font-size:11px; color:var(--text-dim); padding-left:4px; }
.chat-send { flex-shrink:0; width:46px; height:46px; border-radius:50%; border:none; background:var(--green-700); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(26,107,46,0.3); transition:background 0.2s,transform 0.1s; }
.chat-send:hover { background:var(--green-500); }
.chat-send:active { transform:scale(0.93); }
.chat-send:disabled { opacity:0.5; cursor:not-allowed; }

/* INVITE CONNEXION */
.login-wall { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
.login-card { max-width:360px; width:100%; background:var(--surface); border-radius:18px; box-shadow:var(--shadow-lg); padding:28px 24px; text-align:center; border:2px solid var(--green-700); }
.login-card h2 { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; color:var(--green-700); margin-bottom:10px; }
.login-card p { color:var(--text-dim); font-size:14px; line-height:1.6; margin-bottom:20px; }
.login-card a { display:inline-block; padding:12px 28px; background:var(--green-700); color:#fff; font-weight:700; text-decoration:none; border-radius:12px; font-size:15px; }
.login-card a:hover { background:var(--green-500); }
.loading-zone { flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:15px; }

/* ══════ TCHAT ══════ */
(function(){
  var API='api.php';
  var list=document.getElementById('messagesList');
  var formZone=document.getElementById('chatFormZone');
  var loginWall=document.getElementById('loginWall');
  var loadingZone=document.getElementById('loadingZone');
  var errBox=document.getElementById('errBox');
  var chatForm=document.getElementById('chatForm');
  var msgInput=document.getElementById('msgInput');
  var sendBtn=document.getElementById('sendBtn');
  var userBadge=document.getElementById('userBadge');
  var myId=0, isAdmin=false;

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function showErr(m){errBox.innerHTML=m?'<div class="chat-error">'+esc(m)+'</div>':'';}

  function isImg(u){return /\.(jpe?g|png|gif|webp|avif|svg)(\?.*)?$/i.test(u);}
  function isYT(u){return /youtube\.com\/watch|youtu\.be\//i.test(u);}
  function isSP(u){return /open\.spotify\.com\/(track|album|playlist)\//i.test(u);}
  function ytId(u){var m=u.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);return m?m[1]:'';}
  function spEmb(u){var m=u.match(/open\.spotify\.com\/(track|album|playlist)\/([A-Za-z0-9]+)/i);return m?'https://open.spotify.com/embed/'+m[1]+'/'+m[2]:'';}

  function renderBody(c){
    if(!c)return'';
    var re=/(https?:\/\/[^\s<>"]+)/gi,parts=[],last=0,m;
    while((m=re.exec(c))!==null){
      var b=c.slice(last,m.index);if(b)parts.push({t:'text',v:b});
      var url=m[0].replace(/[.,;:!?)>]+$/,'');
      if(isImg(url))parts.push({t:'img',v:url});
      else if(isYT(url))parts.push({t:'yt',v:url});
      else if(isSP(url))parts.push({t:'sp',v:url});
      else parts.push({t:'link',v:url});
      last=m.index+url.length;
    }
    if(last<c.length)parts.push({t:'text',v:c.slice(last)});
    return parts.map(function(p){
      if(p.t==='text')return esc(p.v).replace(/\n/g,'<br>');
      if(p.t==='link')return'<a href="'+esc(p.v)+'" target="_blank" rel="noopener noreferrer">'+esc(p.v)+'</a>';
      if(p.t==='img')return'<img src="'+esc(p.v)+'" class="m-img" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
      if(p.t==='yt'){var id=ytId(p.v);return id?'<div class="m-embed"><iframe src="https://www.youtube.com/embed/'+id+'" allowfullscreen></iframe></div>':'<a href="'+esc(p.v)+'" target="_blank">'+esc(p.v)+'</a>';}
      if(p.t==='sp'){var eb=spEmb(p.v);return eb?'<div class="m-embed"><iframe src="'+eb+'" allowfullscreen></iframe></div>':'<a href="'+esc(p.v)+'" target="_blank">'+esc(p.v)+'</a>';}
      return'';
    }).join('');
  }

  function msgHTML(m,isNew){
    var coach=m.role==='coach', del=(m.user_id==myId)||isAdmin;
    var dt=m.created_at?new Date(m.created_at.replace(' ','T')):null;
    var time=dt?dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})+' '+dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'';
    return '<div class="msg-card'+(coach?' is-coach':'')+(isNew?' new':'')+'" data-id="'+m.id+'">'
      +'<div class="msg-head"><span class="msg-name">'+esc(m.display_name)+'</span>'
      +'<span class="msg-role">'+(coach?'👑 Coach':'Parent')+'</span>'
      +'<span class="msg-time">'+time+'</span></div>'
      +'<div class="msg-body">'+renderBody(m.content)+'</div>'
      +(del?'<div class="msg-actions"><button class="msg-del" data-id="'+m.id+'" type="button">🗑 Supprimer</button></div>':'')
      +'</div>';
  }

  function bindDel(){
    list.querySelectorAll('.msg-del').forEach(function(btn){
      btn.onclick=function(){
        var id=parseInt(btn.dataset.id,10);
        if(!id||!confirm('Supprimer ce message ?'))return;
        fetch(API+'?action=chat_delete',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})})
        .then(function(r){return r.json();}).then(function(d){
          if(d.success){var el=list.querySelector('[data-id="'+id+'"]');if(el)el.remove();if(!list.querySelector('.msg-card'))showEmpty();}
          else showErr(d.error||'Erreur');
        });
      };
    });
  }
  function showEmpty(){list.innerHTML='<div class="chat-empty"><div class="chat-empty-icon">💬</div>Aucun message. Sois le premier à écrire !</div>';}

  function applyData(data,first){
    myId=data.user_id||0; isAdmin=!!data.is_admin;
    loadingZone.style.display='none';
    if(myId){list.style.display='flex';formZone.style.display='block';loginWall.style.display='none';}
    else{list.style.display='none';formZone.style.display='none';loginWall.style.display='flex';}
    if(!data.messages||!data.messages.length){showEmpty();return;}
    /* L'API renvoie DESC (récent en premier) → on affiche tel quel */
    list.innerHTML=data.messages.map(function(m){return msgHTML(m,false);}).join('');
    bindDel();
  }

  function load(first){
    fetch(API+'?action=chat_list&limit=150',{credentials:'same-origin'})
    .then(function(r){return r.json();})
    .then(function(d){if(d.success)applyData(d,first);else{loadingZone.style.display='none';showErr(d.error||'Erreur');}})
    .catch(function(){loadingZone.style.display='none';showErr('Connexion impossible.');});
  }

  fetch(API+'?action=check_session',{credentials:'same-origin'})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.logged_in&&d.user){userBadge.textContent=d.user.display_name||d.user.username;if(d.user.role==='coach')userBadge.classList.add('coach');}
    else userBadge.textContent='Non connecté';
  });

  chatForm.addEventListener('submit',function(ev){
    ev.preventDefault();
    var text=msgInput.value.trim();if(!text)return;
    if(!myId){showErr('Connecte-toi pour envoyer un message.');return;}
    sendBtn.disabled=true;showErr('');
    fetch(API+'?action=chat_post',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:text})})
    .then(function(r){return r.json();}).then(function(d){
      sendBtn.disabled=false;
      if(d.success&&d.message){
        msgInput.value='';msgInput.style.height='auto';
        var empty=list.querySelector('.chat-empty');if(empty)empty.remove();
        var tmp=document.createElement('div');
        tmp.innerHTML=msgHTML(d.message,true);
        /* Nouveau message = le plus récent → on l'insère EN HAUT */
        list.insertBefore(tmp.firstElementChild,list.firstChild);
        bindDel();
        list.scrollTop=0;
      }else showErr(d.error||'Erreur envoi');
    }).catch(function(){sendBtn.disabled=false;showErr('Erreur réseau.');});
  });

  msgInput.addEventListener('input',function(){msgInput.style.height='auto';msgInput.style.height=Math.min(msgInput.scrollHeight,110)+'px';if(msgInput.scrollHeight>110)msgInput.style.overflowY='auto';else msgInput.style.overflowY='hidden';});
  msgInput.addEventListener('keydown',function(ev){if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();sendBtn.click();}});

  load(true);
  setInterval(function(){load(false);},5000);
})();
</script>
