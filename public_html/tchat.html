<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tchat — ESPE Basket U9</title>
  <meta name="theme-color" content="#1a6b2e">
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-900: #0f3d1a;
      --green-700: #1a6b2e;
      --green-500: #228b38;
      --green-400: #2da847;
      --gold: #c8a832;
      --bg: #f5f6f8;
      --surface: #ffffff;
      --surface2: #f0f1f4;
      --border: #e0e2e8;
      --text: #1a1d25;
      --text-dim: #6b7280;
      --red: #dc2626;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 20px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .tchat-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(135deg, var(--green-900) 0%, #1a5c2c 50%, var(--green-700) 100%);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: var(--shadow-lg);
    }
    .tchat-header a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tchat-header a:hover { opacity: 0.9; }
    .tchat-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
    }
    .tchat-user-badge {
      font-size: 12px;
      background: rgba(255,255,255,0.2);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .tchat-user-badge.coach { background: rgba(245,158,11,0.4); }
    .tchat-main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .tchat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .tchat-msg {
      background: var(--surface);
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--green-700);
      animation: msgIn 0.25s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .tchat-msg.coach { border-left-color: #f59e0b; }
    .tchat-msg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .tchat-msg-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--green-700);
    }
    .tchat-msg.coach .tchat-msg-name { color: #b45309; }
    .tchat-msg-role {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .tchat-msg-time {
      font-size: 11px;
      color: var(--text-dim);
    }
    .tchat-msg-body {
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .tchat-msg-body a {
      color: var(--green-700);
      text-decoration: none;
      font-weight: 600;
    }
    .tchat-msg-body a:hover { text-decoration: underline; }
    .tchat-msg-body .msg-image {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 8px;
      display: block;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .tchat-msg-body .msg-embed {
      margin-top: 10px;
      border-radius: 12px;
      overflow: hidden;
      max-width: 100%;
    }
    .tchat-msg-body .msg-embed iframe {
      width: 100%;
      height: 200px;
      border: none;
    }
    .tchat-msg-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
    }
    .tchat-msg-actions button {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: 600;
    }
    .tchat-msg-actions button:hover {
      background: rgba(220,38,38,0.1);
      color: var(--red);
    }
    .tchat-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-dim);
      font-size: 15px;
    }
    .tchat-empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
    .tchat-form-wrap {
      position: sticky;
      bottom: 0;
      background: var(--bg);
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }
    .tchat-form {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .tchat-input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .tchat-input {
      width: 100%;
      min-height: 48px;
      max-height: 120px;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 24px;
      font-family: inherit;
      font-size: 15px;
      resize: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .tchat-input:focus {
      outline: none;
      border-color: var(--green-700);
      box-shadow: 0 0 0 4px rgba(26,107,46,0.12);
    }
    .tchat-input::placeholder { color: var(--text-dim); }
    .tchat-hint {
      font-size: 11px;
      color: var(--text-dim);
      padding-left: 4px;
    }
    .tchat-send {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: var(--green-700);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    .tchat-send:hover { background: var(--green-500); }
    .tchat-send:active { transform: scale(0.96); }
    .tchat-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .tchat-login-prompt {
      max-width: 400px;
      margin: 40px auto;
      padding: 24px;
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      border: 2px solid var(--green-700);
    }
    .tchat-login-prompt h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      color: var(--green-700);
      margin-bottom: 12px;
    }
    .tchat-login-prompt p {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .tchat-login-prompt a {
      display: inline-block;
      padding: 12px 28px;
      background: var(--green-700);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      border-radius: 12px;
      font-size: 15px;
    }
    .tchat-login-prompt a:hover { background: var(--green-500); }
    .tchat-loading {
      text-align: center;
      padding: 24px;
      color: var(--text-dim);
    }
    .tchat-error {
      background: rgba(220,38,38,0.1);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <header class="tchat-header">
    <a href="index.html">&larr; Retour</a>
    <span class="tchat-title">TCHAT U9</span>
    <span class="tchat-user-badge" id="userBadge">—</span>
  </header>

  <main class="tchat-main">
    <div id="errorBox"></div>
    <div class="tchat-messages" id="messages"></div>
    <div class="tchat-form-wrap" id="formWrap" style="display:none">
      <form class="tchat-form" id="chatForm">
        <div class="tchat-input-wrap">
          <textarea class="tchat-input" id="input" placeholder="Écris un message… Tu peux coller une image, un lien YouTube/Spotify ou un lien web." rows="1"></textarea>
          <span class="tchat-hint">Images, liens et musiques (YouTube, Spotify) s&#39;affichent automatiquement.</span>
        </div>
        <button type="submit" class="tchat-send" id="sendBtn" title="Envoyer" aria-label="Envoyer">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </form>
    </div>
  </main>

  <div class="tchat-login-prompt" id="loginPrompt" style="display:none">
    <h2>Connecte-toi pour tchatter</h2>
    <p>Le tchat est réservé aux membres connectés (parents, coach). Connecte-toi pour envoyer des messages et participer.</p>
    <a href="index.html#connexion">Se connecter</a>
  </div>

  <div class="tchat-loading" id="loading">Chargement…</div>

  <script>
(function() {
  const API = 'api.php';
  const messagesEl = document.getElementById('messages');
  const formWrap = document.getElementById('formWrap');
  const loginPrompt = document.getElementById('loginPrompt');
  const loadingEl = document.getElementById('loading');
  const errorBox = document.getElementById('errorBox');
  const chatForm = document.getElementById('chatForm');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const userBadge = document.getElementById('userBadge');

  let user = null;
  let currentUserId = 0;
  let isAdmin = false;
  let pollTimer = null;

  function showError(msg) {
    errorBox.innerHTML = msg ? '<div class="tchat-error">' + escapeHtml(msg) + '</div>' : '';
  }
  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function linkify(content) {
    if (!content || typeof content !== 'string') return '';
    const urlRe = /(https?:\/\/[^\s<]+)/gi;
    return content.replace(urlRe, function(url) {
      return '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(url) + '</a>';
    });
  }

  function isImageUrl(url) {
    return /\.(jpe?g|png|gif|webp|avif)(\?.*)?$/i.test(url) || /imgur\.com|i\.imgur\.com|cdn\.|cloudinary\.|images\./i.test(url);
  }
  function isYoutubeUrl(url) {
    return /youtube\.com\/watch|youtu\.be\//i.test(url);
  }
  function isSpotifyUrl(url) {
    return /spotify\.com|open\.spotify\.com/i.test(url);
  }
  function youtubeEmbed(url) {
    let id = '';
    const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (m) id = m[1];
    return id ? 'https://www.youtube.com/embed/' + id : '';
  }
  function spotifyEmbed(url) {
    const m = url.match(/spotify\.com\/(track|album|playlist)\/([a-zA-Z0-9]+)/i);
    if (m) return 'https://open.spotify.com/embed/' + m[1] + '/' + m[2];
    return '';
  }

  function renderContent(content) {
    if (!content) return '';
    const parts = [];
    const urlRe = /(https?:\/\/[^\s]+)/gi;
    let lastIndex = 0;
    let match;
    while ((match = urlRe.exec(content)) !== null) {
      const before = content.slice(lastIndex, match.index);
      if (before) parts.push({ type: 'text', value: before });
      const url = match[0].replace(/[.,;:!?)]+$/, '');
      if (isImageUrl(url)) parts.push({ type: 'image', value: url });
      else if (isYoutubeUrl(url)) parts.push({ type: 'youtube', value: url });
      else if (isSpotifyUrl(url)) parts.push({ type: 'spotify', value: url });
      else parts.push({ type: 'link', value: url });
      lastIndex = match.index + url.length;
    }
    if (lastIndex < content.length) parts.push({ type: 'text', value: content.slice(lastIndex) });

    let html = '';
    for (const p of parts) {
      if (p.type === 'text') html += escapeHtml(p.value).replace(/\n/g, '<br>');
      else if (p.type === 'link') html += '<a href="' + escapeHtml(p.value) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(p.value) + '</a>';
      else if (p.type === 'image') html += '<img src="' + escapeHtml(p.value) + '" alt="" class="msg-image" loading="lazy" onerror="this.style.display=\'none\'">';
      else if (p.type === 'youtube') {
        const emb = youtubeEmbed(p.value);
        if (emb) html += '<div class="msg-embed"><iframe src="' + escapeHtml(emb) + '" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe></div>';
        else html += '<a href="' + escapeHtml(p.value) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(p.value) + '</a>';
      } else if (p.type === 'spotify') {
        const emb = spotifyEmbed(p.value);
        if (emb) html += '<div class="msg-embed"><iframe src="' + escapeHtml(emb) + '" allowfullscreen allow="autoplay; clipboard-write; encrypted-media;"></iframe></div>';
        else html += '<a href="' + escapeHtml(p.value) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(p.value) + '</a>';
      }
    }
    return html || escapeHtml(content).replace(/\n/g, '<br>');
  }

  function renderMessage(m, currentUserId, canDeleteAll) {
    const isOwn = m.user_id == currentUserId;
    const canDelete = isOwn || canDeleteAll;
    const isCoach = m.role === 'coach';
    const time = m.created_at ? new Date(m.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) : '';
    const body = renderContent(m.content);
    return '<div class="tchat-msg' + (isCoach ? ' coach' : '') + '" data-id="' + m.id + '">' +
      '<div class="tchat-msg-header">' +
        '<span class="tchat-msg-name">' + escapeHtml(m.display_name) + '</span>' +
        (m.role ? '<span class="tchat-msg-role">' + escapeHtml(m.role) + '</span>' : '') +
        '<span class="tchat-msg-time">' + time + '</span>' +
      '</div>' +
      '<div class="tchat-msg-body">' + body + '</div>' +
      (canDelete ? '<div class="tchat-msg-actions"><button type="button" data-id="' + m.id + '" class="btn-delete">Supprimer</button></div>' : '') +
    '</div>';
  }

  function loadMessages() {
    fetch(API + '?action=chat_list&limit=100', { credentials: 'same-origin' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        loadingEl.style.display = 'none';
        if (data.success) {
            currentUserId = data.user_id || 0;
            isAdmin = data.is_admin === true;
            if (data.user_id) {
              formWrap.style.display = 'block';
              loginPrompt.style.display = 'none';
              userBadge.textContent = user ? (user.display_name || user.username) : 'Connecté';
            } else {
            formWrap.style.display = 'none';
            loginPrompt.style.display = 'block';
            userBadge.textContent = 'Invité';
          }
          messagesEl.innerHTML = data.messages.length === 0
            ? '<div class="tchat-empty"><div class="tchat-empty-icon">💬</div>Aucun message. Sois le premier à écrire&nbsp;!</div>'
            : data.messages.map(function(m) { return renderMessage(m, data.user_id, isAdmin); }).join('');
          bindDeleteButtons();
        } else {
          showError(data.error || 'Erreur chargement');
        }
      })
      .catch(function() {
        loadingEl.style.display = 'none';
        showError('Impossible de charger le tchat.');
      });
  }

  function checkSession() {
    fetch(API + '?action=check_session', { credentials: 'same-origin' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.logged_in && data.user) {
          user = data.user;
          isAdmin = data.user.role === 'coach';
          userBadge.textContent = data.user.display_name || data.user.username || 'Connecté';
          if (data.user.role === 'coach') userBadge.classList.add('coach');
        }
      });
  }

  function bindDeleteButtons() {
    messagesEl.querySelectorAll('.btn-delete').forEach(function(btn) {
      btn.onclick = function() {
        var id = parseInt(btn.getAttribute('data-id'), 10);
        if (!id) return;
        if (!confirm('Supprimer ce message ?')) return;
        fetch(API + '?action=chat_delete', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: id })
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.success) {
              var block = messagesEl.querySelector('[data-id="' + id + '"]');
              if (block) block.remove();
            } else showError(data.error || 'Erreur');
          });
      };
    });
  }

  chatForm.addEventListener('submit', function(e) {
    e.preventDefault();
    var text = input.value.trim();
    if (!text) return;
    if (!currentUserId) { showError('Connecte-toi pour envoyer un message.'); return; }
    sendBtn.disabled = true;
    showError('');
    fetch(API + '?action=chat_post', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: text })
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        sendBtn.disabled = false;
        if (data.success && data.message) {
          input.value = '';
          input.style.height = 'auto';
          var html = renderMessage(data.message, currentUserId, isAdmin);
          var div = document.createElement('div');
          div.innerHTML = html;
          messagesEl.appendChild(div.firstElementChild);
          messagesEl.scrollTop = messagesEl.scrollHeight;
          bindDeleteButtons();
        } else showError(data.error || 'Erreur envoi');
      })
      .catch(function() {
        sendBtn.disabled = false;
        showError('Erreur réseau.');
      });
  });

  input.addEventListener('input', function() {
    if (input.scrollHeight > 120) input.style.height = '120px';
    else input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  loadMessages();
  checkSession();

  setInterval(function() {
    if (!messagesEl.querySelector('.tchat-msg') && !document.querySelector('.tchat-empty')) return;
    fetch(API + '?action=chat_list&limit=100', { credentials: 'same-origin' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.success || !data.messages) return;
        var currentScroll = messagesEl.scrollHeight - messagesEl.scrollTop;
        var wasAtBottom = currentScroll <= messagesEl.clientHeight + 50;
        messagesEl.innerHTML = data.messages.length === 0
          ? '<div class="tchat-empty"><div class="tchat-empty-icon">💬</div>Aucun message.</div>'
          : data.messages.map(function(m) { return renderMessage(m, data.user_id, data.is_admin); }).join('');
        bindDeleteButtons();
        if (wasAtBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
      });
  }, 4000);
})();
  </script>
</body>
</html>
